<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Directory</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="text-center mb-4">Phone Directory</h1>

            <div id="alertBox"></div>

            <form id="contactForm" class="mb-4">
              <input type="hidden" id="contactId" />

              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label">Name</label>
                  <input type="text" id="name" class="form-control" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Phone</label>
                  <input type="text" id="phone" class="form-control" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" required />
                </div>
              </div>

              <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Contact</button>
                <button type="button" id="cancelBtn" class="btn btn-secondary d-none">Cancel Edit</button>
              </div>
            </form>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control"
                  placeholder="Search by name, phone, or email"
                />
              </div>
              <div class="col-md-3">
                <select id="sortSelect" class="form-select">
                  <option value="asc">Sort: A to Z</option>
                  <option value="desc">Sort: Z to A</option>
                </select>
              </div>
              <div class="col-md-3">
                <select id="limitSelect" class="form-select">
                  <option value="5">5 per page</option>
                  <option value="10">10 per page</option>
                  <option value="20">20 per page</option>
                </select>
              </div>
            </div>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th style="width: 160px;">Actions</th>
                  </tr>
                </thead>
                <tbody id="contactTableBody">
                  <tr>
                    <td colspan="4" class="text-center">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
              <button id="prevBtn" class="btn btn-outline-primary btn-sm">Previous</button>
              <span id="pageInfo" class="fw-semibold"></span>
              <button id="nextBtn" class="btn btn-outline-primary btn-sm">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
